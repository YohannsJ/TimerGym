# Compila el APK debug de la app Android nativa.
# El repo no incluye Gradle wrapper: se usa Gradle 8.7 del action
# (compatible con AGP 8.5.2). El APK queda como artifact descargable;
# en tags v* se publica ademas como release.
name: Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: timergym-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish release (solo tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "TimerGym ${GITHUB_REF_NAME}" \
            --generate-notes \
            app/build/outputs/apk/debug/app-debug.apk
